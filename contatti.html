<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contattami</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="min-h-screen flex items-center justify-center px-6 py-24">
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 max-w-2xl w-full">
      <h1 class="text-4xl font-outfit font-black mb-8 text-center text-emerald-600 uppercase tracking-tight">Contattami</h1>
      
      <!-- Form with Formspree integration -->
      <form action="https://formspree.io/f/mvgknkqy" method="POST" class="space-y-6">
        <div>
          <label for="name" class="block mb-2 text-sm font-medium text-gray-700">Nome</label>
          <input type="text" id="name" name="name" required class="w-full px-4 py-3 bg-gray-50 text-gray-800 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition" />
        </div>
        <div>
          <label for="email" class="block mb-2 text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="email" name="email" required class="w-full px-4 py-3 bg-gray-50 text-gray-800 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition" />
        </div>
        <div>
          <label for="message" class="block mb-2 text-sm font-medium text-gray-700">Messaggio</label>
          <textarea id="message" name="message" rows="5" required class="w-full px-4 py-3 bg-gray-50 text-gray-800 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition"></textarea>
        </div>
        <div class="text-center">
          <button type="submit" class="px-8 py-4 bg-emerald-500 text-white text-sm font-bold uppercase tracking-wide rounded-full shadow-lg shadow-emerald-500/30 btn-glow hover:bg-emerald-400 transition w-full md:w-auto">Invia Messaggio</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
